<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bikepacking Nav - Send Route</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      padding: 24px;
      max-width: 600px;
      margin: 0 auto;
    }
    h1 { font-size: 20px; color: #4ade80; margin-bottom: 8px; }
    p { font-size: 14px; color: #94a3b8; margin-bottom: 16px; }
    .card {
      background: #1e293b;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 12px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    input, textarea {
      width: 100%;
      padding: 10px 12px;
      background: #334155;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      color: #f1f5f9;
      font-size: 14px;
      font-family: inherit;
    }
    textarea { height: 100px; resize: vertical; }
    .drop-zone {
      border: 2px dashed rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 32px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .drop-zone:hover, .drop-zone.drag { border-color: #4ade80; background: rgba(74,222,128,0.04); }
    .drop-zone input { display: none; }
    .btn {
      width: 100%;
      padding: 12px;
      background: #4ade80;
      color: #000;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #status { margin-top: 12px; font-size: 13px; color: #94a3b8; text-align: center; }
    .preview { font-size: 12px; color: #64748b; margin-top: 8px; }
    .wp-count { color: #4ade80; font-weight: 700; }
  </style>
</head>
<body>
  <h1>Bikepacking Nav</h1>
  <p>Send a route to your Bangle.js 2 watch via Bluetooth</p>

  <div class="card">
    <label>Route Name</label>
    <input type="text" id="routeName" value="My Route" placeholder="Route name">
  </div>

  <div class="card">
    <label>Import GPX File</label>
    <div class="drop-zone" id="dropZone">
      <p>Drop .gpx file here or click to browse</p>
      <input type="file" id="gpxFile" accept=".gpx">
    </div>
    <div class="preview" id="preview"></div>
  </div>

  <div class="card">
    <label>Or Paste Waypoints (lat,lon per line)</label>
    <textarea id="manualWps" placeholder="50.0614,19.9372&#10;49.2990,19.9490"></textarea>
  </div>

  <button class="btn" id="sendBtn" disabled>Send to Watch</button>
  <div id="status"></div>

  <script src="https://www.puck-js.com/puck.js"></script>
  <script>
    var waypoints = [];
    var routeName = "My Route";

    var dropZone = document.getElementById("dropZone");
    var gpxFile = document.getElementById("gpxFile");
    var preview = document.getElementById("preview");
    var sendBtn = document.getElementById("sendBtn");
    var status = document.getElementById("status");
    var nameInput = document.getElementById("routeName");
    var manualWps = document.getElementById("manualWps");

    dropZone.onclick = function() { gpxFile.click(); };
    dropZone.ondragover = function(e) { e.preventDefault(); dropZone.classList.add("drag"); };
    dropZone.ondragleave = function() { dropZone.classList.remove("drag"); };
    dropZone.ondrop = function(e) {
      e.preventDefault();
      dropZone.classList.remove("drag");
      if (e.dataTransfer.files[0]) parseGPX(e.dataTransfer.files[0]);
    };
    gpxFile.onchange = function() { if (gpxFile.files[0]) parseGPX(gpxFile.files[0]); };

    function parseGPX(file) {
      var reader = new FileReader();
      reader.onload = function() {
        var parser = new DOMParser();
        var doc = parser.parseFromString(reader.result, "text/xml");
        waypoints = [];

        // Get track points
        var trkpts = doc.querySelectorAll("trkpt");
        if (trkpts.length === 0) trkpts = doc.querySelectorAll("rtept");

        // Sample to max 100 waypoints (Bangle memory limit)
        var step = Math.max(1, Math.floor(trkpts.length / 80));
        for (var i = 0; i < trkpts.length; i += step) {
          waypoints.push([
            parseFloat(trkpts[i].getAttribute("lat")),
            parseFloat(trkpts[i].getAttribute("lon"))
          ]);
        }
        // Always include last point
        if (trkpts.length > 0) {
          var last = trkpts[trkpts.length - 1];
          var lastWp = [parseFloat(last.getAttribute("lat")), parseFloat(last.getAttribute("lon"))];
          var existing = waypoints[waypoints.length - 1];
          if (existing[0] !== lastWp[0] || existing[1] !== lastWp[1]) {
            waypoints.push(lastWp);
          }
        }

        // Try to get route name from GPX
        var nameEl = doc.querySelector("name");
        if (nameEl && nameEl.textContent) {
          nameInput.value = nameEl.textContent;
        }

        updatePreview();
      };
      reader.readAsText(file);
    }

    // Manual waypoint input
    manualWps.oninput = function() {
      var lines = manualWps.value.trim().split("\n");
      waypoints = [];
      for (var i = 0; i < lines.length; i++) {
        var parts = lines[i].split(",");
        if (parts.length >= 2) {
          var lat = parseFloat(parts[0].trim());
          var lon = parseFloat(parts[1].trim());
          if (!isNaN(lat) && !isNaN(lon)) {
            waypoints.push([lat, lon]);
          }
        }
      }
      updatePreview();
    };

    function updatePreview() {
      if (waypoints.length > 0) {
        preview.innerHTML = '<span class="wp-count">' + waypoints.length + ' waypoints</span> loaded';
        sendBtn.disabled = false;
      } else {
        preview.innerHTML = '';
        sendBtn.disabled = true;
      }
    }

    sendBtn.onclick = function() {
      routeName = nameInput.value || "Route";

      var routeData = JSON.stringify({
        name: routeName,
        waypoints: waypoints
      });

      status.textContent = "Connecting to watch...";
      sendBtn.disabled = true;

      Puck.write('\x03', function() {
        // Small delay then send data
        setTimeout(function() {
          var cmd = 'require("Storage").writeJSON("bikepack.route.json",' + routeData + ');\n';
          status.textContent = "Sending " + waypoints.length + " waypoints...";

          Puck.write(cmd, function() {
            setTimeout(function() {
              // Launch the app
              Puck.write('load("bikepack.app.js");\n', function() {
                status.textContent = "Route sent! Watch is navigating.";
                sendBtn.disabled = false;
              });
            }, 500);
          });
        }, 200);
      });
    };
  </script>
</body>
</html>
