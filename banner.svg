<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#1a2a3a"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#58a6ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0"/>
      <stop offset="20%" stop-color="#58a6ff" stop-opacity="0.6"/>
      <stop offset="80%" stop-color="#58a6ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="120" fill="url(#bg)"/>
  <rect y="90" width="1200" height="30" fill="url(#accent)"/>

  <!-- Decorative dots -->
  <circle cx="240" cy="70" r="1" fill="#58a6ff" opacity="0.03"/>
<circle cx="280" cy="30" r="2" fill="#58a6ff" opacity="0.04"/>
<circle cx="320" cy="90" r="3" fill="#58a6ff" opacity="0.05"/>
<circle cx="360" cy="50" r="1" fill="#58a6ff" opacity="0.06"/>
<circle cx="400" cy="10" r="2" fill="#58a6ff" opacity="0.07"/>
<circle cx="440" cy="70" r="3" fill="#58a6ff" opacity="0.03"/>
<circle cx="480" cy="30" r="1" fill="#58a6ff" opacity="0.04"/>
<circle cx="520" cy="90" r="2" fill="#58a6ff" opacity="0.05"/>
<circle cx="560" cy="50" r="3" fill="#58a6ff" opacity="0.06"/>
<circle cx="600" cy="10" r="1" fill="#58a6ff" opacity="0.07"/>
<circle cx="640" cy="70" r="2" fill="#58a6ff" opacity="0.03"/>
<circle cx="680" cy="30" r="3" fill="#58a6ff" opacity="0.04"/>


  <!-- Accent line -->
  <line x1="0" y1="118" x2="1200" y2="118" stroke="url(#line)" stroke-width="2"/>

  <!-- Icon -->
  <g color="#58a6ff">
    <g transform="translate(80,40) scale(0.9)" opacity="0.12">
      <circle cx="20" cy="30" r="18" fill="none" stroke="currentColor" stroke-width="3"/>
      <circle cx="80" cy="30" r="18" fill="none" stroke="currentColor" stroke-width="3"/>
      <path d="M20,30 L40,5 L60,5 L80,30 L50,30 L40,5" fill="none" stroke="currentColor" stroke-width="2.5"/>
      <line x1="55" y1="5" x2="60" y2="-5" stroke="currentColor" stroke-width="2"/>
    </g>
    <g transform="translate(960,20) scale(0.7)" opacity="0.08">
      <path d="M0,80 Q30,20 60,60 Q90,100 120,40" fill="none" stroke="currentColor" stroke-width="3"/>
      <circle cx="0" cy="80" r="4" fill="currentColor"/>
      <circle cx="120" cy="40" r="4" fill="currentColor"/>
    </g>
  </g>

  <!-- Title -->
  <text x="600" y="52" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="32" font-weight="700" fill="#e6edf3" text-anchor="middle" letter-spacing="1">Bikepacking Planner</text>

  <!-- Subtitle -->
  <text x="600" y="78" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="14" fill="#8b949e" text-anchor="middle" letter-spacing="0.5">Route planning with Overpass, weather & supply logistics</text>
</svg>